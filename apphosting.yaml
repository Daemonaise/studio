# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# By setting a backendId, you are telling App Hosting to always deploy
# to this specific backend, rather than creating a new one on each deploy.
backendId: karasawalabs

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

env:
  # Public vars — safe to commit, embedded at build time
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://karasawalabs.com
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    value: pk_live_51T2mQnRrkouaWiyyMOPj9IsRZcl8CLkJPDcrvQ0EdWGAc41AfjJA3ML5RZ9HkPIN0LAQ8JjGtd4ct1xQp8kzWgI400cL50hexy

  # Secret vars — reference Firebase Secret Manager (do NOT put raw values here)
  # Run once in terminal to register each secret:
  #   firebase apphosting:secrets:set STRIPE_SECRET_KEY
  #   firebase apphosting:secrets:set SHIPPO_API_KEY
  #   firebase apphosting:secrets:set GEMINI_API_KEY
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: SHIPPO_API_KEY
    secret: SHIPPO_API_KEY
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY

  # Shippo from-address (non-secret)
  - variable: SHIPPO_FROM_STREET
    value: 6001 W Parmer Ln Ste 370 974
  - variable: SHIPPO_FROM_CITY
    value: Austin
  - variable: SHIPPO_FROM_STATE
    value: TX
  - variable: SHIPPO_FROM_ZIP
    value: "78727"
  - variable: SHIPPO_FROM_PHONE
    value: "+14086588582"
  - variable: SHIPPO_FROM_EMAIL
    value: info@karasawalabs.com
